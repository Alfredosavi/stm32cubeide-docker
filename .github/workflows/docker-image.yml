name: Docker Image Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Docker tag
        run: echo "RELEASE_TAG=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build . --file Dockerfile \
            --tag alfredosavi/stm32cubeide-image:latest \
            --tag alfredosavi/stm32cubeide-image:$RELEASE_TAG

      - name: Push Docker image
        run: |
          docker push alfredosavi/stm32cubeide-image:latest
          docker push alfredosavi/stm32cubeide-image:$RELEASE_TAG
